# HARDENING: devops-agent 2026-06-24
name: Release Production Pipeline

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: macos-latest # macOS required for iOS builds
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

      - name: Build Android Release AppBundle (AAB)
        run: |
          flutter build appbundle --release \
            --build-number=$GITHUB_RUN_NUMBER \
            --dart-define=ENV=prod \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL_PROD }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY_PROD }}" \
            --dart-define=FIREBASE_API_KEY_WEB="${{ secrets.FIREBASE_API_KEY_WEB }}" \
            --dart-define=FIREBASE_API_KEY_ANDROID="${{ secrets.FIREBASE_API_KEY_ANDROID }}" \
            --dart-define=FIREBASE_API_KEY_IOS="${{ secrets.FIREBASE_API_KEY_IOS }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN_PROD }}"

      - name: Build iOS Release IPA
        run: |
          flutter build ipa --release --no-codesign \
            --build-number=$GITHUB_RUN_NUMBER \
            --dart-define=ENV=prod \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL_PROD }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY_PROD }}" \
            --dart-define=FIREBASE_API_KEY_WEB="${{ secrets.FIREBASE_API_KEY_WEB }}" \
            --dart-define=FIREBASE_API_KEY_ANDROID="${{ secrets.FIREBASE_API_KEY_ANDROID }}" \
            --dart-define=FIREBASE_API_KEY_IOS="${{ secrets.FIREBASE_API_KEY_IOS }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN_PROD }}"

      - name: Upload Android Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload iOS Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa

      # Firebase App Distribution & Slack Notifications would be configured below
      # using community actions (e.g. wzieba/Firebase-App-Distribution) when keys are set.
