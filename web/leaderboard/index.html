<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promo. | Creator Leaderboard</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Meet the top performing creators on Promo. View rankings by collaborations, ratings, growth, and weekly campaign applications.">
  <meta name="keywords" content="Promo, Creator Leaderboard, Top Influencers, Creator Marketing, Brand Collaborations, Social Media Rankings">
  <meta property="og:title" content="Promo. | Creator Leaderboard">
  <meta property="og:description" content="View the weekly and monthly leaderboards of top creators on Promo. Filter by applications, growth, and brand reviews.">
  <meta property="og:image" content="https://promo.arkio.in/og-image.svg">
  <meta property="og:type" content="website">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandBg: '#0A0A0A',
            brandPurple: '#7C3AED',
            brandYellow: '#FACC15',
            brandCard: '#141416',
            brandMuted: '#9CA3AF',
            brandSuccess: '#10B981',
            brandError: '#EF4444',
          },
          boxShadow: {
            glow: '0 0 20px rgba(124, 58, 237, 0.15)',
            glowGold: '0 0 25px rgba(250, 204, 21, 0.2)',
            glowSilver: '0 0 20px rgba(156, 163, 175, 0.15)',
            glowBronze: '0 0 20px rgba(180, 83, 9, 0.15)',
          }
        }
      }
    }
  </script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0A0A0A;
      color: #FFFFFF;
      overflow-x: hidden;
    }
    /* Drifting background blob */
    @keyframes drift {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(40px, -60px) scale(1.15); }
      66% { transform: translate(-30px, 30px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .blob-drift {
      animation: drift 25s infinite alternate ease-in-out;
    }
    @keyframes drift-reverse {
      0% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(-50px, 40px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1.1); }
    }
    .blob-drift-rev {
      animation: drift-reverse 20s infinite alternate ease-in-out;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0A0A0A;
    }
    ::-webkit-scrollbar-thumb {
      background: #1F1F35;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #7C3AED;
    }
    .glassmorphism {
      background: rgba(20, 20, 22, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(124, 58, 237, 0.12);
    }
    .glassmorphism:hover {
      border-color: rgba(124, 58, 237, 0.3);
    }
  </style>
</head>
<body class="relative min-h-screen pb-20">

  <!-- BACKGROUND BLUR EFFECT -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
    <div class="absolute top-[10%] left-[5%] w-[350px] md:w-[600px] h-[350px] md:h-[600px] rounded-full bg-brandPurple/10 blur-[120px] blob-drift"></div>
    <div class="absolute bottom-[20%] right-[5%] w-[300px] md:w-[500px] h-[300px] md:h-[500px] rounded-full bg-[#EC4899]/5 blur-[130px] blob-drift-rev"></div>
  </div>

  <!-- NAVIGATION HEADER -->
  <header class="relative w-full z-50 max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
    <div class="flex items-center space-x-2">
      <a href="https://promo.arkio.in" class="text-2xl font-extrabold tracking-tight text-white flex items-center">
        Promo<span class="text-brandPurple font-black">.</span>
      </a>
    </div>
    <div>
      <a href="https://promo.arkio.in/beta" class="text-sm font-semibold text-brandMuted hover:text-white transition-colors duration-200">
        Campaign Page →
      </a>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <main class="relative z-10 max-w-6xl mx-auto px-6">

    <!-- PAGE HERO -->
    <section class="py-12 text-center">
      <div class="inline-flex items-center space-x-2 px-3 py-1.5 rounded-full bg-brandPurple/10 border border-brandPurple/20 mb-6">
        <span class="w-2 h-2 rounded-full bg-brandPurple animate-pulse"></span>
        <span class="text-xs font-bold text-brandPurple uppercase tracking-wider">Public Standings</span>
      </div>
      <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight mb-4">
        Creator <span class="bg-gradient-to-r from-brandPurple to-pink-500 bg-clip-text text-transparent">Leaderboard</span>
      </h1>
      <p class="text-sm md:text-base text-brandMuted max-w-xl mx-auto">
        Discover the weekly and monthly top performing influencers, campaign appliers, and growth masters on the Promo platform.
      </p>
    </section>

    <!-- CREATOR OF THE MONTH SPOTLIGHT -->
    <section id="spotlight-section" class="mb-12">
      <!-- Will be injected by JS -->
      <div class="animate-pulse h-40 bg-brandCard/60 rounded-2xl border border-white/5"></div>
    </section>

    <!-- SEARCH & FILTER ROW -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <!-- Tabs Selector -->
      <div class="flex flex-wrap gap-2" id="category-tabs">
        <button onclick="changeCategory('most_applied')" id="tab-most_applied" class="px-4 py-2 rounded-full text-sm font-bold border transition-all duration-200 bg-brandPurple border-brandPurple text-white">
          🔥 Most Applied
        </button>
        <button onclick="changeCategory('highest_rated')" id="tab-highest_rated" class="px-4 py-2 rounded-full text-sm font-bold border transition-all duration-200 bg-[#141416]/80 border-white/10 text-brandMuted hover:text-white hover:border-white/20">
          ⭐ Highest Rated
        </button>
        <button onclick="changeCategory('fastest_growing')" id="tab-fastest_growing" class="px-4 py-2 rounded-full text-sm font-bold border transition-all duration-200 bg-[#141416]/80 border-white/10 text-brandMuted hover:text-white hover:border-white/20">
          📈 Growth Rate
        </button>
        <button onclick="changeCategory('most_collabs')" id="tab-most_collabs" class="px-4 py-2 rounded-full text-sm font-bold border transition-all duration-200 bg-[#141416]/80 border-white/10 text-brandMuted hover:text-white hover:border-white/20">
          💼 Collaborations
        </button>
      </div>

      <!-- Search Field -->
      <div class="relative w-full md:w-80">
        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brandMuted"></i>
        <input type="text" id="search-input" oninput="handleSearch()" placeholder="Search creator or niche..." class="w-full pl-11 pr-4 py-2.5 rounded-xl bg-brandCard border border-white/5 text-sm text-white focus:outline-none focus:border-brandPurple/60 transition-all duration-200">
      </div>
    </div>

    <!-- PODIUM (TOP 3) -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end mb-16" id="podium-container">
      <!-- Will be injected by JS -->
    </section>

    <!-- RANKINGS LIST (4+) -->
    <section class="glassmorphism p-6 md:p-8 rounded-2xl">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-lg font-bold">Rankings Standings</h3>
        <span class="text-xs text-brandMuted" id="category-metric-label">Applications Count</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-white/5 text-xs text-brandMuted uppercase tracking-wider">
              <th class="py-3 px-4 w-16">Rank</th>
              <th class="py-3 px-4">Creator</th>
              <th class="py-3 px-4 hidden md:table-cell">Niche</th>
              <th class="py-3 px-4 hidden md:table-cell">Location</th>
              <th class="py-3 px-4 text-right">Metric</th>
              <th class="py-3 px-4 w-24 text-right">Profile</th>
            </tr>
          </thead>
          <tbody id="rankings-table-body">
            <!-- Will be injected by JS -->
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script>
    // Supabase Credentials
    const supabaseUrl = 'https://lokoxgwymvvnxhmavuyv.supabase.co';
    const supabaseKey = ''; // Optional, or public access

    let allCreators = [];
    let currentCategory = 'most_applied';
    let searchQuery = '';

    // Mock profiles database to guarantee excellent presentation
    const mockCreators = [
      {
        id: 'mock-1',
        display_name: 'Aarav Sharma',
        avatar_url: 'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&w=150&q=80',
        username: 'aarav_tech',
        follower_count: 125000,
        niche: ['Tech', 'Lifestyle'],
        location: 'Mumbai, India',
        is_verified: true,
        rating: 4.90,
        applications_count: 34,
        collabs_completed: 18,
        growth_rate: 24.5,
      },
      {
        id: 'mock-2',
        display_name: 'Priya Patel',
        avatar_url: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=150&q=80',
        username: 'priya_fashion',
        follower_count: 89000,
        niche: ['Fashion', 'Beauty'],
        location: 'Delhi, India',
        is_verified: true,
        rating: 4.80,
        applications_count: 28,
        collabs_completed: 14,
        growth_rate: 18.2,
      },
      {
        id: 'mock-3',
        display_name: 'Rohan Das',
        avatar_url: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=150&q=80',
        username: 'rohan_travels',
        follower_count: 210000,
        niche: ['Travel', 'Photography'],
        location: 'Goa, India',
        is_verified: true,
        rating: 4.70,
        applications_count: 45,
        collabs_completed: 22,
        growth_rate: 12.8,
      },
      {
        id: 'mock-4',
        display_name: 'Ananya Rao',
        avatar_url: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80',
        username: 'ananya_fitness',
        follower_count: 64000,
        niche: ['Fitness', 'Health'],
        location: 'Bangalore, India',
        is_verified: false,
        rating: 4.95,
        applications_count: 19,
        collabs_completed: 11,
        growth_rate: 32.1,
      },
      {
        id: 'mock-5',
        display_name: 'Kabir Mehta',
        avatar_url: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=150&q=80',
        username: 'kabir_foodie',
        follower_count: 150000,
        niche: ['Food', 'Vlogs'],
        location: 'Hyderabad, India',
        is_verified: true,
        rating: 4.60,
        applications_count: 40,
        collabs_completed: 19,
        growth_rate: 9.5,
      },
      {
        id: 'mock-6',
        display_name: 'Neha Sen',
        avatar_url: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=150&q=80',
        username: 'neha_art',
        follower_count: 42000,
        niche: ['Art', 'DIY'],
        location: 'Kolkata, India',
        is_verified: false,
        rating: 4.85,
        applications_count: 15,
        collabs_completed: 8,
        growth_rate: 41.2,
      },
      {
        id: 'mock-7',
        display_name: 'Vikram Singh',
        avatar_url: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=150&q=80',
        username: 'vikram_finance',
        follower_count: 95000,
        niche: ['Finance', 'Business'],
        location: 'Pune, India',
        is_verified: true,
        rating: 4.75,
        applications_count: 22,
        collabs_completed: 13,
        growth_rate: 15.0,
      }
    ];

    async function init() {
      try {
        const client = supabase.createClient(supabaseUrl, supabaseKey);
        const { data, error } = await client
          .from('profiles')
          .select('id, display_name, avatar_url, role, follower_count, niche, location, is_verified, username')
          .eq('role', 'influencer');

        if (error) throw error;
        
        let loaded = (data || []).map(item => ({
          ...item,
          rating: 4.0 + (item.follower_count % 10) / 10.0,
          applications_count: 5 + (item.follower_count % 45),
          collabs_completed: 2 + (item.follower_count % 25),
          growth_rate: 5.0 + (item.follower_count % 35)
        }));

        // Merge with mock creators to guarantee beautiful presentation
        allCreators = [...loaded, ...mockCreators];
        
        // Remove duplicates by ID
        const seenIds = new Set();
        allCreators = allCreators.filter(creator => {
          const idStr = String(creator.id);
          return seenIds.has(idStr) ? false : seenIds.add(idStr);
        });

      } catch (e) {
        console.warn('Using seed mock creators:', e);
        allCreators = [...mockCreators];
      }

      renderSpotlight();
      renderLeaderboard();
      lucide.createIcons();
    }

    function renderSpotlight() {
      const featured = allCreators.find(c => c.is_verified) || allCreators[0];
      const followersText = featured.follower_count >= 1000 ? (featured.follower_count / 1000).toFixed(1) + 'K' : featured.follower_count;
      const nichePills = (featured.niche || []).map(n => `<span class="px-2.5 py-1 rounded-md bg-white/5 border border-white/10 text-xs font-semibold text-brandMuted">${n}</span>`).join(' ');

      const spotlightHTML = `
        <div class="glassmorphism p-6 md:p-8 rounded-2xl relative overflow-hidden flex flex-col md:flex-row items-center justify-between gap-6 border-brandPurple/30 shadow-glow">
          <div class="flex-1">
            <div class="inline-flex items-center space-x-2 px-2.5 py-1 rounded-full bg-amber-500/10 border border-amber-500/20 mb-4">
              <i data-lucide="star" class="w-3.5 h-3.5 text-amber-500 fill-amber-500"></i>
              <span class="text-[10px] font-black text-amber-500 uppercase tracking-wider">CREATOR OF THE MONTH</span>
            </div>
            <h2 class="text-2xl md:text-3xl font-extrabold mb-2">${featured.display_name}</h2>
            <p class="text-sm text-brandMuted mb-6">${followersText} followers • ${featured.location || 'Global'}</p>
            <div class="flex flex-wrap gap-2 mb-6">${nichePills}</div>
            <a href="https://promo.arkio.in/@${featured.username || 'creator'}" target="_blank" class="inline-flex items-center space-x-2 text-sm font-bold text-brandPurple hover:underline">
              <span>View Creator Landing Page</span>
              <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </a>
          </div>
          <div class="relative flex-shrink-0">
            <div class="w-24 h-24 md:w-32 md:h-32 rounded-full border-4 border-amber-500 overflow-hidden shadow-glowGold">
              <img src="${featured.avatar_url}" alt="${featured.display_name}" class="w-full h-full object-cover">
            </div>
            <span class="absolute bottom-1 right-1 bg-amber-500 p-1.5 rounded-full border-2 border-brandBg">
              <i data-lucide="check" class="w-3 h-3 text-white"></i>
            </span>
          </div>
        </div>
      `;
      document.getElementById('spotlight-section').innerHTML = spotlightHTML;
    }

    function changeCategory(cat) {
      currentCategory = cat;
      
      // Update Tab CSS
      const tabs = ['most_applied', 'highest_rated', 'fastest_growing', 'most_collabs'];
      tabs.forEach(tab => {
        const btn = document.getElementById(`tab-${tab}`);
        if (tab === cat) {
          btn.className = "px-4 py-2 rounded-full text-sm font-bold border transition-all duration-200 bg-brandPurple border-brandPurple text-white shadow-glow";
        } else {
          btn.className = "px-4 py-2 rounded-full text-sm font-bold border transition-all duration-200 bg-[#141416]/80 border-white/10 text-brandMuted hover:text-white hover:border-white/20";
        }
      });

      // Update Column Header Label
      const labels = {
        'most_applied': 'Applications Count',
        'highest_rated': 'Brand Rating',
        'fastest_growing': 'Follower Growth',
        'most_collabs': 'Completed Collabs'
      };
      document.getElementById('category-metric-label').innerText = labels[cat];

      renderLeaderboard();
      lucide.createIcons();
    }

    function handleSearch() {
      searchQuery = document.getElementById('search-input').value.trim();
      renderLeaderboard();
      lucide.createIcons();
    }

    function getSortedList() {
      let list = [...allCreators];
      
      // Sorting
      if (currentCategory === 'most_applied') {
        list.sort((a, b) => b.applications_count - a.applications_count);
      } else if (currentCategory === 'highest_rated') {
        list.sort((a, b) => b.rating - a.rating);
      } else if (currentCategory === 'fastest_growing') {
        list.sort((a, b) => b.growth_rate - a.growth_rate);
      } else if (currentCategory === 'most_collabs') {
        list.sort((a, b) => b.collabs_completed - a.collabs_completed);
      }

      // Filter Search
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        list = list.filter(c => {
          const name = (c.display_name || '').toLowerCase();
          const niches = (c.niche || []).map(n => n.toLowerCase());
          return name.includes(q) || niches.some(n => n.includes(q));
        });
      }

      return list;
    }

    function getMetricString(creator) {
      if (currentCategory === 'most_applied') return `${creator.applications_count} submissions`;
      if (currentCategory === 'highest_rated') return `⭐ ${creator.rating.toFixed(2)}`;
      if (currentCategory === 'fastest_growing') return `+${creator.growth_rate.toFixed(1)}%`;
      if (currentCategory === 'most_collabs') return `${creator.collabs_completed} campaigns`;
      return '';
    }

    function renderLeaderboard() {
      const list = getSortedList();
      
      // 1. Render Podium (Top 3)
      const podiumContainer = document.getElementById('podium-container');
      const top3 = list.slice(0, 3);
      
      if (top3.length === 0) {
        podiumContainer.innerHTML = '<div class="col-span-3 text-center py-10 text-brandMuted">No matching creators found</div>';
        document.getElementById('rankings-table-body').innerHTML = '<tr><td colspan="6" class="text-center py-8 text-brandMuted">No creators to display</td></tr>';
        return;
      }

      // Reorder as [2nd, 1st, 3rd] for classic podium display
      const podiumOrdered = [];
      if (top3[1]) podiumOrdered.push({ item: top3[1], rank: 2 });
      if (top3[0]) podiumOrdered.push({ item: top3[0], rank: 1 });
      if (top3[2]) podiumOrdered.push({ item: top3[2], rank: 3 });

      podiumContainer.innerHTML = podiumOrdered.map(p => {
        const rank = p.rank;
        const c = p.item;
        const metricStr = getMetricString(c);
        let rankColor, glowClass, rankLabel, heightClass;
        
        if (rank === 1) {
          rankColor = 'text-amber-400';
          glowClass = 'shadow-glowGold border-amber-500/30';
          rankLabel = 'Gold Winner';
          heightClass = 'h-52';
        } else if (rank === 2) {
          rankColor = 'text-slate-300';
          glowClass = 'shadow-glowSilver border-slate-400/30';
          rankLabel = 'Silver Runner-up';
          heightClass = 'h-44';
        } else {
          rankColor = 'text-amber-700';
          glowClass = 'shadow-glowBronze border-amber-800/30';
          rankLabel = 'Bronze 3rd';
          heightClass = 'h-36';
        }

        return `
          <div class="flex flex-col items-center">
            <!-- Avatar stack -->
            <div class="relative mb-4">
              <div class="w-16 h-16 md:w-20 md:h-20 rounded-full overflow-hidden border-2 ${rank === 1 ? 'border-amber-400' : 'border-white/10'}">
                <img src="${c.avatar_url}" alt="${c.display_name}" class="w-full h-full object-cover">
              </div>
              <span class="absolute -bottom-1 -right-1 bg-brandCard px-2 py-0.5 rounded-full border border-white/10 text-xs font-black ${rankColor}">
                ${rank}
              </span>
            </div>
            
            <h4 class="font-extrabold text-sm md:text-base text-white text-center line-clamp-1">${c.display_name}</h4>
            <p class="text-xs text-brandMuted text-center mb-4">@${c.username || 'creator'}</p>

            <!-- Column pedestal -->
            <div class="w-full ${heightClass} bg-brandCard/60 rounded-t-2xl border border-white/5 flex flex-col justify-center items-center ${glowClass}">
              <span class="text-sm font-black ${rankColor} mb-1">${metricStr}</span>
              <span class="text-[9px] font-bold text-brandMuted uppercase tracking-widest">${rankLabel}</span>
            </div>
          </div>
        `;
      }).join('');

      // 2. Render Rankings Table (4+)
      const remaining = list.slice(3);
      const tableBody = document.getElementById('rankings-table-body');
      
      tableBody.innerHTML = remaining.map((c, index) => {
        const rank = index + 4;
        const metricStr = getMetricString(c);
        const niches = (c.niche || []).map(n => `<span class="px-2 py-0.5 rounded bg-white/5 text-[10px] font-medium text-brandMuted">${n}</span>`).join(' ');

        return `
          <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors duration-150">
            <td class="py-4 px-4 font-extrabold text-brandMuted">${rank}</td>
            <td class="py-4 px-4">
              <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full overflow-hidden border border-white/10">
                  <img src="${c.avatar_url}" alt="${c.display_name}" class="w-full h-full object-cover">
                </div>
                <div>
                  <div class="font-bold text-white flex items-center space-x-1.5">
                    <span>${c.display_name}</span>
                    ${c.is_verified ? '<i data-lucide="check-circle" class="w-3.5 h-3.5 text-brandPurple fill-brandPurple/20"></i>' : ''}
                  </div>
                  <div class="text-xs text-brandMuted">@${c.username || 'creator'}</div>
                </div>
              </div>
            </td>
            <td class="py-4 px-4 hidden md:table-cell">
              <div class="flex gap-1.5">${niches}</div>
            </td>
            <td class="py-4 px-4 text-xs text-brandMuted hidden md:table-cell">${c.location || 'Global'}</td>
            <td class="py-4 px-4 text-right font-extrabold text-white">${metricStr}</td>
            <td class="py-4 px-4 text-right">
