<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promo. | Share Card</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandBg: '#0A0A0A',
            brandPurple: '#7C3AED',
            brandYellow: '#FACC15',
            brandCard: '#1A1A2E',
            brandMuted: '#9CA3AF',
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .poster-container {
      width: 1080px;
      height: 1080px;
      position: relative;
      background-color: #0A0A0A;
      color: #FFFFFF;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.25; transform: scale(1.1); }
    }
    .blob-1 {
      position: absolute;
      top: 15%;
      left: 10%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.3) 0%, rgba(0,0,0,0) 70%);
      filter: blur(60px);
      animation: pulse-slow 10s infinite ease-in-out;
    }
    .blob-2 {
      position: absolute;
      bottom: 10%;
      right: 5%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, rgba(0,0,0,0) 70%);
      filter: blur(80px);
      animation: pulse-slow 12s infinite ease-in-out alternate;
    }
  </style>
</head>
<body>

  <!-- 1080x1080 Instagram Square Poster -->
  <div class="poster-container flex flex-col justify-between p-24 select-none">
    
    <!-- Background Glow Blobs -->
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <!-- TOP SECTION: LOGO -->
    <div class="relative z-10 flex justify-center w-full">
      <div class="text-4xl font-extrabold tracking-tight">
        Promo<span class="text-brandPurple font-black">.</span>
      </div>
    </div>

    <!-- MIDDLE SECTION: CAMPAIGN DETAILS -->
    <div class="relative z-10 flex flex-col items-center text-center space-y-12">
      <!-- Pill Badges -->
      <div class="inline-flex items-center space-x-3 px-5 py-2.5 rounded-full bg-brandYellow/10 border border-brandYellow/30 shadow-[0_0_20px_rgba(250,204,21,0.08)]">
        <span class="w-2 h-2 rounded-full bg-brandYellow animate-ping"></span>
        <span class="text-sm font-bold text-brandYellow tracking-widest uppercase">
          BUG BOUNTY + IDEA REWARDS + INTERNSHIPS
        </span>
      </div>

      <!-- Main Headline -->
      <h1 class="text-7xl font-black tracking-tight leading-tight max-w-2xl">
        Help us build <span class="bg-gradient-to-r from-brandPurple to-pink-500 bg-clip-text text-transparent">Promo.</span>
      </h1>

      <!-- Subtext -->
      <p class="text-2xl text-brandMuted max-w-xl font-medium">
        Report bugs. Share ideas. Join the team.
      </p>

      <!-- Three Large Icons -->
      <div class="flex items-center space-x-12 pt-6">
        <div class="flex flex-col items-center space-y-2">
          <span class="text-6xl filter drop-shadow-[0_0_15px_rgba(124,58,237,0.3)]">🐛</span>
          <span class="text-xs uppercase tracking-widest text-brandMuted font-bold">Bugs</span>
        </div>
        <div class="text-3xl text-brandPurple/40 font-light">+</div>
        <div class="flex flex-col items-center space-y-2">
          <span class="text-6xl filter drop-shadow-[0_0_15px_rgba(250,204,21,0.3)]">💡</span>
          <span class="text-xs uppercase tracking-widest text-brandMuted font-bold">Ideas</span>
        </div>
        <div class="text-3xl text-brandPurple/40 font-light">+</div>
        <div class="flex flex-col items-center space-y-2">
          <span class="text-6xl filter drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">🎓</span>
          <span class="text-xs uppercase tracking-widest text-brandMuted font-bold">Interns</span>
        </div>
      </div>
    </div>

    <!-- BOTTOM SECTION: URL & CREDITS -->
    <div class="relative z-10 flex justify-between items-end w-full">
      <div class="flex flex-col items-start space-y-1">
        <span class="text-xs uppercase tracking-wider text-brandMuted font-semibold">Join Campaign At</span>
        <span class="text-2xl font-bold text-white tracking-wide border-b-2 border-brandPurple pb-0.5">
          promo.arkio.in/beta
        </span>
      </div>

      <div class="flex items-center space-x-2 text-brandMuted text-sm font-semibold">
        <span>Made in India</span>
        <span class="text-lg">🇮🇳</span>
      </div>
    </div>

  </div>

</body>
</html>
